name: "Build and Push"

"on":
  pull_request:
    branches:
      - main
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:

  build:
    name: "Build and Push Application Container Images"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      image: ${{ steps.build.outputs.fully_qualified_image_digest }}

    steps:
      - name: Remove unnecessary files
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: build
        uses: lsst-sqre/build-and-push-to-ghcr@v1
        with:
          dockerfile: Dockerfile
          image: ${{ github.repository }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  coverage:
    name: "Run pytest with coverage"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Dogfood the image we just built so the test environment matches
    # production exactly (sentry-sdk, summit_utils, etc. all preinstalled).
    container:
      image: ${{ needs.build.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: "Run pytest with coverage"
        shell: bash
        run: |
          set -euo pipefail
          source /opt/lsst/software/stack/loadLSST.bash
          setup lsst_distrib
          # Mirror startup.sh: setup the in-image clones for the rest of
          # the stack, then overlay this PR's rubintv_production with -j
          # so it wins over the version baked into the image.
          for repo in obs_lsst drp_pipe Spectractor atmospec \
                     summit_utils summit_extras pipe_base daf_butler \
                     ts_wep ts_ofc ts_config_mttcs donut_viz TARTS \
                     rubintv_analysis_service; do
            (cd "/repos/${repo}" && setup -k -r .)
          done
          pip install pytest pytest-cov
          setup -j -r "${GITHUB_WORKSPACE}"
          pytest \
            --cov=lsst.rubintv.production \
            --cov-report=xml \
            --cov-report=term \
            tests/

      - name: "Upload coverage to Codecov"
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
