name: "Build and Push"

"on":
  pull_request:
    branches:
      - main
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:

  build:
    name: "Build and Push Application Container Images"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    outputs:
      image: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}

    steps:
      - name: Remove unnecessary files
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------------------------------------------------
      # Why we are not using lsst-sqre/build-and-push-to-ghcr@v1 here
      # ---------------------------------------------------------------
      # That action is the LSST-standard wrapper and is what most other
      # repos in the org use, so the deviation is deliberate and worth
      # flagging. The action is a thin wrapper around docker/build-push-
      # action, but it hard-codes
      #
      #     cache-from: type=gha
      #     cache-to:   type=gha,mode=max
      #
      # in its action.yaml with no inputs to override. The GitHub Actions
      # cache is capped at 10 GB per repo (FIFO eviction) and is scoped
      # per-branch with only base-branch fallback.
      #
      # Our final image is tens of GB once the LSST stack and every
      # cloned sibling repo are built, which blows past the 10 GB cap, so
      # layers were getting evicted between runs. The symptom was
      # "no-change" rebuilds taking ~20 minutes because most of the
      # Dockerfile was being redone from the network even though nothing
      # had changed.
      #
      # Below we re-implement what the action does (login, metadata, tag
      # derivation, build-and-push) directly, but point the buildx cache
      # at GHCR itself. Registry cache has no size cap (backed by GHCR
      # storage), is shared across branches, and lets fresh feature
      # branches start warm from main's last successful build via the
      # ``buildcache-main`` fallback. The tag-derivation logic mirrors
      # the action's docker-tag.sh exactly so existing image tags do not
      # change.
      #
      # If lsst-sqre/build-and-push-to-ghcr ever exposes cache-from /
      # cache-to as inputs (or accepts a PR that does), we should switch
      # back to the action and pass the registry cache args through it.
      # ---------------------------------------------------------------

      - name: Derive image tag
        id: tag
        shell: bash
        # Mirrors the previous docker-tag.sh: HEAD_REF on PRs, REF_NAME on
        # branch / tag pushes, with ``/`` collapsed to ``-``.
        run: |
          set -euo pipefail
          if [ -n "${GITHUB_HEAD_REF:-}" ]; then
            ref="${GITHUB_HEAD_REF}"
          else
            ref="${GITHUB_REF_NAME}"
          fi
          echo "tag=${ref//\//-}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-branch cache write so concurrent PRs don't thrash each
          # other; reads fall back to main's cache so fresh branches still
          # start warm.
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository }}:buildcache-${{ steps.tag.outputs.tag }}
            type=registry,ref=ghcr.io/${{ github.repository }}:buildcache-main
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache-${{ steps.tag.outputs.tag }},mode=max

  coverage:
    name: "Run pytest with coverage"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Dogfood the image we just built so the test environment matches
    # production exactly (sentry-sdk, summit_utils, etc. all preinstalled).
    container:
      image: ${{ needs.build.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      # ``--user root`` is needed for actions/checkout to write into the
      # GHA-mounted workspace. We can't fix HOME here -- GitHub always
      # overrides the container's HOME to ``/github/home`` for container
      # jobs, regardless of any ``-e HOME=...`` we pass -- so the
      # override has to happen inside the run step instead. See the
      # ``export HOME=/home/saluser`` line in the coverage step below.
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: "Run pytest with coverage"
        shell: bash
        run: |
          # No ``set -u``: the LSST stack's conda activation hooks
          # (eups_activate.sh) reference EUPS_PATH unguarded before it's
          # set, which is harmless normally but fatal under nounset.
          set -eo pipefail
          # Override the GHA-injected HOME=/github/home back to saluser's
          # real HOME *before* sourcing anything. Several Dockerfile
          # ``pip install`` lines run as saluser with conda active; the
          # conda env ships PEP 668's EXTERNALLY-MANAGED marker, so pip
          # silently falls back to a ``--user`` install and lands those
          # packages (sentry-sdk, easyocr, google-cloud-storage, ...) in
          # /home/saluser/.local/lib/python3.13/site-packages/. Python's
          # site.py only finds them when HOME points there. (Alternative
          # if this becomes fragile: move the affected packages into
          # the ``conda install`` block in the Dockerfile so they live
          # in the conda env site-packages and don't depend on HOME.)
          export HOME=/home/saluser
          # Get conda's python on PATH up front so we can parse the
          # phalanx YAML below; the image has no system python before
          # ``loadLSST.bash`` activates the conda env. startup.sh sources
          # loadLSST.bash itself further down -- idempotent.
          source /opt/lsst/software/stack/loadLSST.bash
          # ---------------------------------------------------------------
          # Pull RA_PULL_DIRECTORIES + DEPLOY_BRANCH from phalanx, which
          # is the authoritative source of truth for how the prod pods
          # are configured. Beats hardcoding a list here that drifts:
          # without this, every time a sister repo (summit_utils,
          # summit_extras, ...) ships a new symbol that rubintv_production
          # starts importing, CI breaks until the Dockerfile pin catches
          # up. With this, CI tracks whatever the prod chart says.
          #
          # Try phalanx at the same ticket branch first (so a multi-repo
          # ticket can ship a phalanx values override pinning sister-repo
          # branches), fall back to phalanx main.
          #
          # We deliberately do NOT override DEPLOY_BRANCH to this PR's
          # ticket name in CI: startup.sh's per-repo fallback when the
          # named branch doesn't exist is "use current branch", which
          # for the in-image clones is the Dockerfile-pinned tag (e.g.
          # w_2026_13) -- the very stale snapshot we are trying to move
          # off of. Multi-repo tickets should ship a phalanx values
          # override on a matching ticket branch in lsst-sqre/phalanx
          # instead; the curl below picks it up automatically.
          # ---------------------------------------------------------------
          PR_REF="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          PHALANX_BASE="https://raw.githubusercontent.com/lsst-sqre/phalanx"
          VALUES_PATH="applications/rapid-analysis/values-summit.yaml"
          curl -sfL "${PHALANX_BASE}/${PR_REF}/${VALUES_PATH}" -o /tmp/phalanx-values.yaml \
            || curl -sfL "${PHALANX_BASE}/main/${VALUES_PATH}" -o /tmp/phalanx-values.yaml
          # Python parser written to a file because inline ``python -c
          # '...'`` would inherit the YAML block scalar's leading indent
          # and trip Python's IndentationError. Heredoc inside a YAML
          # ``run: |`` block has its common leading indent stripped by
          # YAML, so the file ends up correctly column-aligned.
          cat > /tmp/parse-phalanx.py <<'PY'
          import yaml
          with open("/tmp/phalanx-values.yaml") as f:
              env = (yaml.safe_load(f) or {}).get("env", {})
          print(f"export RA_PULL_DIRECTORIES={env.get('RA_PULL_DIRECTORIES', '')!r}")
          print(f"export DEPLOY_BRANCH={env.get('DEPLOY_BRANCH', 'main')!r}")
          PY
          eval "$(python /tmp/parse-phalanx.py)"
          echo "Using DEPLOY_BRANCH=${DEPLOY_BRANCH}"
          echo "Using RA_PULL_DIRECTORIES=${RA_PULL_DIRECTORIES}"
          # Source the production entrypoint so CI uses exactly the same
          # loadLSST + setup chain the pods use. startup.sh leaves us in
          # /repos/rubintv_production/scripts at the end -- cd back to
          # the PR checkout afterwards.
          source /repos/.startup.sh
          cd "${GITHUB_WORKSPACE}"
          # Overlay this PR's rubintv_production with -j (just-this-product)
          # so it wins over the version baked into the image without
          # disturbing the rest of the env.
          setup -j -r "${GITHUB_WORKSPACE}"
          # Quick sanity print so future failures don't have to re-debug
          # which interpreter / site-packages / HOME are in scope. The
          # HOME line is load-bearing: the in-image pip installs are in
          # saluser's user-site, and Python only finds them when HOME is
          # /home/saluser (see container.options above).
          python -c '
          import os, site, sys
          print("python:        ", sys.executable)
          print("HOME:          ", os.environ.get("HOME"))
          print("user-site:     ", site.getusersitepackages())
          print("user-site live:", os.path.isdir(site.getusersitepackages()))
          print("ENABLE_USER_SITE:", site.ENABLE_USER_SITE)
          '
          pip install pytest pytest-cov
          pytest \
            --cov=lsst.rubintv.production \
            --cov-report=xml \
            --cov-report=term \
            tests/

      - name: "Upload coverage to Codecov"
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
