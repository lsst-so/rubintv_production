name: "Build and Push"

"on":
  pull_request:
    branches:
      - main
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:

  build:
    name: "Build and Push Application Container Images"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      image: ${{ steps.meta.outputs.tags }}@${{ steps.build.outputs.digest }}

    steps:
      - name: Remove unnecessary files
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Derive image tag
        id: tag
        shell: bash
        # Mirrors the previous docker-tag.sh: HEAD_REF on PRs, REF_NAME on
        # branch / tag pushes, with ``/`` collapsed to ``-``.
        run: |
          set -euo pipefail
          if [ -n "${GITHUB_HEAD_REF:-}" ]; then
            ref="${GITHUB_HEAD_REF}"
          else
            ref="${GITHUB_REF_NAME}"
          fi
          echo "tag=${ref//\//-}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  mypy:
    name: "Run mypy"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Dogfood the image we just built so mypy resolves the same
    # lsst.summit.utils / lsst.ts.wep / lsst.atmospec / etc. imports
    # the production pods see. The lsst/rubin_workflows shared mypy
    # workflow runs in plain CPython and can't find any of those (they
    # are not on PyPI), so we run it inside our own container instead.
    container:
      image: ${{ needs.build.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: "Run mypy"
        shell: bash
        run: |
          # No ``set -u``: the LSST stack's conda activation hooks
          # (eups_activate.sh) reference EUPS_PATH unguarded before it's
          # set, which is harmless normally but fatal under nounset.
          set -eo pipefail
          # GHA forces HOME=/github/home for container jobs, but several
          # in-image pip installs (sentry-sdk, easyocr, ...) live in
          # saluser's user-site. Point HOME back at saluser so Python
          # finds them.
          export HOME=/home/saluser
          source /opt/lsst/software/stack/loadLSST.bash
          setup lsst_distrib
          # Disable git's "dubious ownership" check for the in-image
          # /repos/* clones, which are owned by saluser but accessed
          # here as root.
          git config --global --add safe.directory '*'
          # Setup the in-image clones for the rest of the stack, then
          # overlay this PR's rubintv_production with -j so it wins
          # over the version baked into the image.
          for repo in obs_lsst drp_pipe Spectractor atmospec \
                     summit_utils summit_extras pipe_base daf_butler \
                     ts_wep ts_ofc ts_config_mttcs donut_viz TARTS \
                     rubintv_analysis_service; do
            (cd "/repos/${repo}" && setup -k -r .)
          done
          setup -j -r "${GITHUB_WORKSPACE}"
          # Generate version.py so __init__.py's `from .version import *`
          # resolves -- otherwise mypy reports a missing-stub error for
          # the package itself.
          cd "${GITHUB_WORKSPACE}" && scons version
          # https://github.com/python/mypy/issues/17002
          pip install 'mypy!=1.9.0'
          mypy

  coverage:
    name: "Run pytest with coverage"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Same dogfooding rationale as the mypy job above: the test
    # environment is byte-identical to what we ship, so sentry-sdk,
    # summit_utils, summit_extras and the rest of the in-image
    # dependencies are already present.
    container:
      image: ${{ needs.build.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: "Run pytest with coverage"
        shell: bash
        run: |
          # See the mypy job above for why ``-u`` is dropped.
          set -eo pipefail
          export HOME=/home/saluser
          source /opt/lsst/software/stack/loadLSST.bash
          setup lsst_distrib
          git config --global --add safe.directory '*'
          for repo in obs_lsst drp_pipe Spectractor atmospec \
                     summit_utils summit_extras pipe_base daf_butler \
                     ts_wep ts_ofc ts_config_mttcs donut_viz TARTS \
                     rubintv_analysis_service; do
            (cd "/repos/${repo}" && setup -k -r .)
          done
          setup -j -r "${GITHUB_WORKSPACE}"
          cd "${GITHUB_WORKSPACE}" && scons version
          pip install pytest pytest-cov
          pytest \
            --cov=lsst.rubintv.production \
            --cov-report=xml \
            --cov-report=term \
            tests/

      - name: "Upload coverage to Codecov"
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
