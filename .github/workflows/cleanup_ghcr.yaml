name: "Cleanup GHCR"

# Routinely prune old container images and buildcache layers from GHCR.
#
# Why this exists:
#   build_and_push.yaml pushes one image tag per branch (collapsing
#   ``/`` to ``-``) plus a paired ``buildcache-<tag>`` registry-cache
#   layer, so every PR ever built leaves two long-lived artefacts
#   behind. Storage isn't free forever and the package version list
#   becomes unmanageable fast. We hoped to push the registry-cache
#   support upstream into ``lsst-sqre/build-and-push-to-ghcr`` so the
#   cleanup concern became theirs too, but they declined (they're
#   moving to a different workflow), so it lives here.
#
# Safety model -- WHAT WE KEEP:
#   1. ``main``, ``buildcache-main``, ``latest`` -- always.
#   2. Any tag that looks like a semver / dotted-version release
#      (``1.2.3``, ``v1.2``, ``1.2.3-rc1``, ``2026.04.28`` ...).
#      Anything you want to retain long-term, tag it.
#   3. Anything pushed within the last ``RECENT_DAYS`` (default 14).
#      Protects active iteration on a PR.
#
# WHAT WE DELETE:
#   * Tagged versions older than ``RECENT_DAYS`` whose tags don't
#     match the keep rules above. (Branch existence on origin used
#     to be a keep signal, but in practice branches outlive their
#     usefulness here -- if you want an image kept, tag it.)
#   * Untagged manifests older than ``UNTAGGED_DAYS`` (default 30).
#     These are orphaned layers left behind when a tag was overwritten
#     by a newer build.
#
# Operational notes:
#   * Runs weekly + on demand. ``dry_run: true`` (default for manual
#     runs) prints the plan without deleting -- use this to sanity
#     check after editing the rules.
#   * Always writes a markdown summary to the run page (counts +
#     biggest categories + link to the GHCR package settings where
#     the actual on-disk size is shown).

"on":
  schedule:
    # Sunday 03:00 UTC. Off-hours, doesn't collide with the weekly
    # stack rebuild.
    - cron: "0 3 * * 0"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "List proposed deletions without actually deleting"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

permissions:
  contents: read
  packages: write

concurrency:
  group: cleanup-ghcr
  cancel-in-progress: false

jobs:
  cleanup:
    name: "Prune stale GHCR versions"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OWNER: ${{ github.repository_owner }}
      PACKAGE: ${{ github.event.repository.name }}
      # Scheduled runs always actually delete; manual runs default to
      # dry-run unless the operator flips the input.
      DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || (inputs.dry_run || 'true') }}
      RECENT_DAYS: "14"
      UNTAGGED_DAYS: "30"
    steps:
      - name: "Fetch package versions and plan deletions"
        run: |
          set -euo pipefail

          # lsst-so is a GitHub org, so use the org packages endpoint.
          # (The user-packages endpoint returns 404 for org-owned
          # packages even with a valid token.)
          API="/orgs/${OWNER}/packages/container/${PACKAGE}/versions"

          tagged_cutoff=$(date -u -d "${RECENT_DAYS} days ago" +%s)
          untagged_cutoff=$(date -u -d "${UNTAGGED_DAYS} days ago" +%s)
          echo "Tagged cutoff:   $(date -u -d @${tagged_cutoff} -Iseconds) (${RECENT_DAYS}d)"
          echo "Untagged cutoff: $(date -u -d @${untagged_cutoff} -Iseconds) (${UNTAGGED_DAYS}d)"

          gh api "${API}" --paginate \
            --jq '.[] | {id, created_at, tags: (.metadata.container.tags // [])}' \
            > /tmp/versions.jsonl

          total=$(wc -l < /tmp/versions.jsonl | tr -d ' ')
          echo "Found ${total} package versions."

          : > /tmp/to-delete.txt
          # Per-category counters for the summary step.
          : > /tmp/cat-keep-protected.txt
          : > /tmp/cat-keep-release.txt
          : > /tmp/cat-keep-recent.txt
          : > /tmp/cat-keep-untagged-recent.txt
          : > /tmp/cat-del-stale.txt
          : > /tmp/cat-del-untagged.txt

          while IFS= read -r line; do
            id=$(jq -r '.id' <<<"$line")
            created=$(jq -r '.created_at' <<<"$line")
            created_epoch=$(date -u -d "$created" +%s)
            mapfile -t tags < <(jq -r '.tags[]?' <<<"$line")

            if [ "${#tags[@]}" -eq 0 ]; then
              if [ "$created_epoch" -lt "$untagged_cutoff" ]; then
                echo "DELETE untagged  ${id}  (created ${created})"
                echo "$id" >> /tmp/to-delete.txt
                echo "$id ${created}" >> /tmp/cat-del-untagged.txt
              else
                echo "KEEP   untagged  ${id}  (recent: ${created})"
                echo "$id ${created}" >> /tmp/cat-keep-untagged-recent.txt
              fi
              continue
            fi

            keep=0
            keep_reason=""
            keep_bucket=""
            for t in "${tags[@]}"; do
              case "$t" in
                main|buildcache-main|latest)
                  keep=1; keep_reason="protected '$t'"; keep_bucket="protected"; break;;
              esac
              # Semver-ish: ``1.2``, ``1.2.3``, ``v1.2.3``, ``1.2.3-rc1``,
              # ``2026.04.28``. Deliberately permissive -- false
              # positives just keep something we could've pruned.
              if [[ "$t" =~ ^v?[0-9]+(\.[0-9]+){1,2}([.+-][A-Za-z0-9.+-]+)?$ ]]; then
                keep=1; keep_reason="release tag '$t'"; keep_bucket="release"; break
              fi
            done

            if [ "$keep" -eq 1 ]; then
              echo "KEEP   tagged    ${id}  [${tags[*]}]  -- ${keep_reason}"
              echo "$id ${created} ${tags[*]}" >> "/tmp/cat-keep-${keep_bucket}.txt"
              continue
            fi

            if [ "$created_epoch" -lt "$tagged_cutoff" ]; then
              echo "DELETE stale     ${id}  [${tags[*]}]  (created ${created})"
              echo "$id" >> /tmp/to-delete.txt
              echo "$id ${created} ${tags[*]}" >> /tmp/cat-del-stale.txt
            else
              echo "KEEP   recent    ${id}  [${tags[*]}]  (created ${created})"
              echo "$id ${created} ${tags[*]}" >> /tmp/cat-keep-recent.txt
            fi
          done < /tmp/versions.jsonl

          n=$(wc -l < /tmp/to-delete.txt | tr -d ' ')
          echo "Planned deletions: ${n}"

      - name: "Execute deletions"
        run: |
          set -euo pipefail
          n=$(wc -l < /tmp/to-delete.txt | tr -d ' ')
          if [ "$n" -eq 0 ]; then
            echo "Nothing to delete."
            exit 0
          fi
          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN -- would delete ${n} versions:"
            cat /tmp/to-delete.txt
            exit 0
          fi
          # Hard ceiling on scheduled runs: if a logic bug ever
          # proposes a huge wipe, require a manual run to confirm.
          if [ "$n" -gt 200 ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "::error::Refusing to delete ${n} versions from a scheduled run (limit 200)."
            echo "::error::Re-run manually with dry_run=false to override."
            exit 1
          fi
          while read -r id; do
            echo "Deleting ${id}..."
            gh api -X DELETE \
              "/orgs/${OWNER}/packages/container/${PACKAGE}/versions/${id}"
          done < /tmp/to-delete.txt
          echo "Deleted ${n} versions."

      - name: "Write summary"
        if: always()
        run: |
          set -euo pipefail
          # Defensive: if the planning step failed before writing
          # these, treat them as empty so the summary still renders.
          for f in protected release recent untagged-recent; do
            touch "/tmp/cat-keep-${f}.txt"
          done
          for f in stale untagged; do
            touch "/tmp/cat-del-${f}.txt"
          done
          touch /tmp/to-delete.txt /tmp/versions.jsonl

          total=$(wc -l < /tmp/versions.jsonl | tr -d ' ')
          k_prot=$(wc -l < /tmp/cat-keep-protected.txt | tr -d ' ')
          k_rel=$(wc -l < /tmp/cat-keep-release.txt | tr -d ' ')
          k_rec=$(wc -l < /tmp/cat-keep-recent.txt | tr -d ' ')
          k_unt=$(wc -l < /tmp/cat-keep-untagged-recent.txt | tr -d ' ')
          d_st=$(wc -l < /tmp/cat-del-stale.txt | tr -d ' ')
          d_un=$(wc -l < /tmp/cat-del-untagged.txt | tr -d ' ')
          d_total=$(wc -l < /tmp/to-delete.txt | tr -d ' ')

          mode="dry-run"
          if [ "${DRY_RUN}" != "true" ]; then mode="executed"; fi

          {
            echo "# GHCR cleanup summary"
            echo
            echo "**Package:** \`ghcr.io/${OWNER}/${PACKAGE}\`  "
            echo "**Mode:** \`${mode}\`  "
            echo "**Total versions before run:** ${total}"
            echo
            echo "## Counts by category"
            echo
            echo "| Action | Category | Count |"
            echo "|---|---|---:|"
            echo "| Keep | Protected (main / buildcache-main / latest) | ${k_prot} |"
            echo "| Keep | Release tag (semver-ish) | ${k_rel} |"
            echo "| Keep | Tagged & recent (< ${RECENT_DAYS}d) | ${k_rec} |"
            echo "| Keep | Untagged & recent (< ${UNTAGGED_DAYS}d) | ${k_unt} |"
            echo "| Delete | Tagged & stale (>= ${RECENT_DAYS}d) | ${d_st} |"
            echo "| Delete | Untagged & old (>= ${UNTAGGED_DAYS}d) | ${d_un} |"
            echo "| **Delete** | **Total** | **${d_total}** |"
            echo
            # Top 20 oldest entries scheduled for deletion -- handy
            # for spotting "wait, that one's actually load-bearing"
            # before un-dry-running.
            if [ "${d_total}" -gt 0 ]; then
              echo "## Sample of items planned for deletion (oldest 20)"
              echo
              echo "<details><summary>Click to expand</summary>"
              echo
              echo '```'
              cat /tmp/cat-del-stale.txt /tmp/cat-del-untagged.txt \
                | sort -k2 \
                | head -20
              echo '```'
              echo
              echo "</details>"
              echo
            fi
            echo "## On-disk storage size"
            echo
            echo "The GitHub REST API doesn't expose per-version byte"
            echo "sizes for container packages, so we report counts"
            echo "here. The actual storage size for the whole package"
            echo "is shown on the package settings page:"
            echo
            echo "<https://github.com/orgs/${OWNER}/packages/container/${PACKAGE}/settings>"
            echo
            echo "Org-wide storage and billing:"
            echo "<https://github.com/organizations/${OWNER}/settings/billing>"
          } >> "$GITHUB_STEP_SUMMARY"
