bucketName: rubintv_data

# Required items:
dimensionUniverseFile: ${RA_CI_DATA_ROOT}/butlerDimensionUniverse.json

# Summit items:
nightReportPath:     ${RA_CI_DATA_ROOT}/nightReportData

# AuxTel
auxtelButlerPath: /repo/main
auxTelMetadataPath: ${RA_CI_DATA_ROOT}/sidecar_metadata
auxTelMetadataShardPath: ${RA_CI_DATA_ROOT}/sidecar_metadata/shards

# all sky
allSkyRootDataPath: ${RA_CI_DATA_ROOT}/allsky/raw
allSkyOutputPath: ${RA_CI_DATA_ROOT}/allsky

# animation
moviePngPath: ${RA_CI_DATA_ROOT}/auxTel_animation

# Star Trackers paths:
# The path at which to find the data on disk. Does not include the
# GenericCamera/101/ or GenericCamera/102/ part, just the base directory.
starTrackerDataPath: ${RA_CI_STAR_TRACKER_DATA_PATH}
starTrackerOutputPath: ${RA_CI_DATA_ROOT}/starTracker/output
starTrackerMetadataPath: ${RA_CI_DATA_ROOT}/starTracker/sidecar_metadata
starTrackerMetadataShardPath: ${RA_CI_DATA_ROOT}/starTracker/sidecar_metadata/shards


# The path to the astrometry.net reference catalogs. Do not include
# the /4100 or /4200, just the base directory.
astrometryNetRefCatPath: ${RA_CI_ASTROMETRY_NET_REF_CAT_PATH}

# ComCam configuration:
comCamButlerPath: /repo/main
# comCamButlerPath: /sdf/data/rubin/repo/aos_imsim/raw/comcam_sensitivity_matrix/repo
binning: 8
# # paths for serving TS8 metadata at SLAC
comCamMetadataPath: ${RA_CI_DATA_ROOT}/LSSTComCam/sidecar_metadata
comCamMetadataShardPath: ${RA_CI_DATA_ROOT}/LSSTComCam/sidecar_metadata/shards

comCamSimMetadataPath: ${RA_CI_DATA_ROOT}/LSSTComCamSim/sidecar_metadata
comCamSimMetadataShardPath: ${RA_CI_DATA_ROOT}/LSSTComCamSim/sidecar_metadata/shards

comCamSimAosMetadataPath: ${RA_CI_DATA_ROOT}/LSSTComCamSimAos/sidecar_metadata
comCamSimAosMetadataShardPath: ${RA_CI_DATA_ROOT}/LSSTComCamSimAos/sidecar_metadata/shards

comCamAosMetadataPath: ${RA_CI_DATA_ROOT}/LSSTComCamAos/sidecar_metadata
comCamAosMetadataShardPath: ${RA_CI_DATA_ROOT}/LSSTComCamAos/sidecar_metadata/shards

raPerformanceDirectory: ${RA_CI_DATA_ROOT}/raPerformance/sidecar_metadata
raPerformanceShardsDirectory: ${RA_CI_DATA_ROOT}/raPerformance/sidecar_metadata/shards

guiderDirectory: ${RA_CI_DATA_ROOT}/LSSTCam/guiders/sidecar_metadata
guiderShardsDirectory: ${RA_CI_DATA_ROOT}/LSSTCam/guiders/sidecar_metadata/shards

lsstCamMetadataPath: ${RA_CI_DATA_ROOT}/LSSTCam/sidecar_metadata
lsstCamMetadataShardPath: ${RA_CI_DATA_ROOT}/LSSTCam/sidecar_metadata/shards
lsstCamAosMetadataPath: ${RA_CI_DATA_ROOT}/LSSTCamAos/sidecar_metadata/shards
lsstCamAosMetadataShardPath: ${RA_CI_DATA_ROOT}/LSSTCamAos/sidecar_metadata/shards
lsstCamButlerPath: main

# Not prefixed with ComCam because were currently just pretending that ComCam is TS8
# Per-user suffix so concurrent CI runs by different users don't clobber one another.
scratchPath : rapidAnalysisScratchCi-${USER}
plotPath: ${RA_CI_DATA_ROOT}/plots

# TMA config:
tmaMetadataPath: ${RA_CI_DATA_ROOT}/tma/sidecar_metadata
tmaMetadataShardPath: ${RA_CI_DATA_ROOT}/tma/sidecar_metadata/shards

consDBURL: "http://consdb-pq.consdb:8080/consdb"

aosLSSTCamPipelineFileDanish: $DONUT_VIZ_DIR/pipelines/production/lsstCamRapidAnalysisPipeline_Danish.yaml
aosLSSTCamPipelineFileTie: $DONUT_VIZ_DIR/pipelines/production/lsstCamRapidAnalysisPipeline_TIE.yaml
aosLSSTCamAiDonutPipelineFile: $DONUT_VIZ_DIR/pipelines/production/lsstCamRapidAnalysisPipeline_AiDonut.yaml
aosLSSTCamTartsPipelineFile: $DONUT_VIZ_DIR/pipelines/production/lsstCamRapidAnalysisTartsUnpairedPipeline.yaml
aosLSSTCamUnpairedDanishPipelineFile: $DONUT_VIZ_DIR/pipelines/production/lsstCamRapidAnalysisPipeline_UnpairedDanish.yaml
aosLSSTCamWcsDanishBin1PipelineFile: $DONUT_VIZ_DIR/pipelines/production/lsstCamRapidAnalysisPipeline_WcsCatDanish_Bin1x.yaml
aosLSSTCamWcsDanishBin2PipelineFile: $DONUT_VIZ_DIR/pipelines/production/lsstCamRapidAnalysisPipeline_WcsCatDanish_Bin2x.yaml

aosLSSTCamFullArrayModePipelineFileDanish: $DONUT_VIZ_DIR/pipelines/production/lsstCamScienceSensorRapidAnalysisPipeline_Danish.yaml
aosLSSTCamFullArrayModePipelineFileTie: $DONUT_VIZ_DIR/pipelines/production/lsstCamScienceSensorRapidAnalysisPipeline_TIE.yaml

aosDataDir: ${RA_CI_DATA_ROOT}/aos_data

sfmPipelineFile:
  LATISS: $ATMOSPEC_DIR/pipelines/processStar.yaml
  LSSTComCamSim: $DRP_PIPE_DIR/pipelines/LSSTComCamSim/quickLook.yaml
  LSSTComCam: $DRP_PIPE_DIR/pipelines/LSSTComCam/quickLook.yaml
  LSSTCam: $DRP_PIPE_DIR/pipelines/LSSTCam/quickLook.yaml

outputChains:
  LATISS: LATISS/runs/quickLookTesting
  LSSTComCam: LSSTComCam/runs/quickLookTesting
  LSSTComCamSim: LSSTComCamSim/runs/quickLookTesting
  LSSTCam: LSSTCam/runs/quickLookTesting
